services:
  - type: web
    name: qdef-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install && node seed.js
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
