[build]
  command = "cd client && npm install && npx vite build && cd .. && npm install && cd server && rm -rf node_modules && npm install"
  publish = "client/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["server/**"]

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
