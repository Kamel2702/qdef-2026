[build]
  command = "cd client && npx vite build && cd ../server && npm install"
  publish = "client/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["server/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
